<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWE | AI Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e27;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(0,0,0,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.3) 0%, transparent 50%),
                linear-gradient(135deg, #0a0e27 0%, #1a1e3c 50%, #0a0e27 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            background: rgba(15, 20, 60, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, #00f5ff, #b829dd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .live-badge { font-size: 0.7rem; color: #00ff88; background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); border-radius: 12px; padding: 0.2rem 0.6rem; }
        .back-btn { padding: 0.4rem 0.875rem; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; text-decoration: none; font-size: 0.8125rem; transition: all 0.2s; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .org-container {
            position: relative; width: 100vw; height: 100vh;
            padding-top: 70px;
            display: flex; justify-content: center; align-items: center;
        }
        .org-svg { width: 95%; max-width: 1100px; height: auto; max-height: calc(100vh - 90px); }

        .org-card { cursor: pointer; transition: all 0.3s; }
        .org-card:hover { filter: brightness(1.2); }

        .org-card-rect { fill: rgba(20, 25, 70, 0.95); stroke-width: 2; rx: 10; filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5)); }
        .org-card-rect.online  { stroke: #00ff88; filter: drop-shadow(0 0 18px rgba(0, 255, 136, 0.5)); }
        .org-card-rect.idle    { stroke: #ff9500; filter: drop-shadow(0 0 12px rgba(255, 149, 0, 0.4)); }
        .org-card-rect.offline { stroke: #555; opacity: 0.7; }

        .status-online { fill: #00ff88; }
        .status-idle   { fill: #ff9500; }
        .status-offline{ fill: #666; }

        .org-line { stroke-width: 1.5; fill: none; opacity: 0.7; }
        .org-line.online  { stroke: #00ff88; animation: pulseLine 2.5s infinite; }
        .org-line.idle    { stroke: #ff9500; stroke-dasharray: 5,5; }
        .org-line.offline { stroke: #444; opacity: 0.3; }

        @keyframes pulseLine { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .legend {
            position: fixed; bottom: 1rem; left: 1rem;
            background: rgba(15, 20, 60, 0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 0.75rem; z-index: 1000;
        }
        .legend-title { font-size: 0.75rem; font-weight: 600; margin-bottom: 0.5rem; }
        .legend-item { display: flex; align-items: center; gap: 0.375rem; margin-bottom: 0.375rem; font-size: 0.6875rem; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.online  { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .legend-dot.idle    { background: #ff9500; box-shadow: 0 0 8px #ff9500; }
        .legend-dot.offline { background: #555; }

        .gateway-status {
            position: fixed; bottom: 1rem; right: 1rem;
            background: rgba(15, 20, 60, 0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 0.75rem; z-index: 1000;
            font-size: 0.75rem;
        }
        .gateway-status .title { font-weight: 600; margin-bottom: 0.35rem; }

        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1999; display: none; }
        .overlay.show { display: block; }

        .agent-details {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 20, 60, 0.98); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; padding: 1.5rem;
            min-width: 340px; max-width: 90vw; z-index: 2000;
            display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .agent-details.show { display: block; }
        .agent-details-close { position: absolute; top: 0.75rem; right: 0.75rem; background: none; border: none; color: #fff; font-size: 1.25rem; cursor: pointer; }
        .agent-details h2 { font-size: 1.25rem; margin-bottom: 0.25rem; }
        .agent-details-role { color: rgba(255,255,255,0.6); margin-bottom: 0.75rem; font-size: 0.875rem; }
        .detail-status { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-bottom: 1rem; }
        .detail-status.online  { background: rgba(0,255,136,0.2); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .detail-status.idle    { background: rgba(255,149,0,0.2); color: #ff9500; border: 1px solid rgba(255,149,0,0.3); }
        .detail-status.offline { background: rgba(100,100,100,0.2); color: #aaa; border: 1px solid rgba(100,100,100,0.3); }
        .agent-details-section { margin-bottom: 0.75rem; }
        .agent-details-section h4 { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .agent-details-section p  { font-size: 0.8125rem; line-height: 1.5; }
        .detail-chip { display: inline-block; background: rgba(0,245,255,0.15); color: #00f5ff; border: 1px solid rgba(0,245,255,0.3); border-radius: 6px; padding: 0.15rem 0.5rem; font-size: 0.7rem; margin: 0.1rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👥 DWE AI Team</h1>
        <div class="header-right">
            <span class="live-badge" id="live-badge">● Loading...</span>
            <a href="/" class="back-btn">← Dashboard</a>
        </div>
    </div>

    <div class="org-container">
        <svg class="org-svg" viewBox="0 0 1100 620" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="grad-ceo" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.3"/>
                    <stop offset="100%" style="stop-color:#b829dd;stop-opacity:0.3"/>
                </linearGradient>
            </defs>

            <!-- ── Connection Lines ── -->
            <!-- CEO → Steve (CTO) -->
            <line class="org-line" id="line-ceo-cto" x1="550" y1="80" x2="280" y2="210" />
            <!-- CEO → Anita (COO) -->
            <line class="org-line" id="line-ceo-anita" x1="550" y1="80" x2="550" y2="210" />
            <!-- CEO → Nicole (CoS) -->
            <line class="org-line" id="line-ceo-nicole" x1="550" y1="80" x2="820" y2="210" />

            <!-- CTO → Chief Engineer -->
            <line class="org-line" id="line-cto-ce" x1="280" y1="270" x2="280" y2="380" />
            <!-- CTO → Main -->
            <line class="org-line" id="line-cto-main" x1="280" y1="270" x2="550" y2="380" />

            <!-- ── CEO / Sidney Garcia ── -->
            <g class="org-card" data-agent="ceo" transform="translate(550,50)">
                <rect class="org-card-rect online" x="-80" y="-34" width="160" height="68" rx="10"/>
                <text text-anchor="middle" font-size="18" y="-10">👑</text>
                <text text-anchor="middle" font-size="11" font-weight="700" fill="#fff" y="8">Sidney Garcia</text>
                <text text-anchor="middle" font-size="8"  fill="rgba(255,255,255,0.6)" y="20">CEO / Founder</text>
                <text text-anchor="middle" font-size="7"  class="status-online" font-weight="600" y="30">● Owner</text>
            </g>

            <!-- ── Steve / CTO ── -->
            <g class="org-card" data-agent="cto" transform="translate(280,240)">
                <rect class="org-card-rect" id="rect-cto" x="-60" y="-30" width="120" height="60" rx="8"/>
                <text text-anchor="middle" font-size="15" y="-8">💻</text>
                <text text-anchor="middle" font-size="10" font-weight="700" fill="#fff" y="7">Steve</text>
                <text text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.6)" y="17">Chief Technology Officer</text>
                <text text-anchor="middle" font-size="6.5" id="status-cto" font-weight="600" y="26">● Loading...</text>
            </g>

            <!-- ── Anita / COO ── -->
            <g class="org-card" data-agent="anita" transform="translate(550,240)">
                <rect class="org-card-rect" id="rect-anita" x="-60" y="-30" width="120" height="60" rx="8"/>
                <text text-anchor="middle" font-size="15" y="-8">⚙️</text>
                <text text-anchor="middle" font-size="10" font-weight="700" fill="#fff" y="7">Anita</text>
                <text text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.6)" y="17">Chief Operating Officer</text>
                <text text-anchor="middle" font-size="6.5" id="status-anita" font-weight="600" y="26">● Loading...</text>
            </g>

            <!-- ── Nicole / Chief of Staff ── -->
            <g class="org-card" data-agent="nicole" transform="translate(820,240)">
                <rect class="org-card-rect" id="rect-nicole" x="-60" y="-30" width="120" height="60" rx="8"/>
                <text text-anchor="middle" font-size="15" y="-8">📋</text>
                <text text-anchor="middle" font-size="10" font-weight="700" fill="#fff" y="7">Nicole</text>
                <text text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.6)" y="17">Chief of Staff</text>
                <text text-anchor="middle" font-size="6.5" id="status-nicole" font-weight="600" y="26">● Loading...</text>
            </g>

            <!-- ── Chief Engineer ── -->
            <g class="org-card" data-agent="chief-engineer" transform="translate(280,420)">
                <rect class="org-card-rect" id="rect-ce" x="-65" y="-30" width="130" height="60" rx="8"/>
                <text text-anchor="middle" font-size="15" y="-8">🔧</text>
                <text text-anchor="middle" font-size="10" font-weight="700" fill="#fff" y="7">Chief Engineer</text>
                <text text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.6)" y="17">Engineering Lead</text>
                <text text-anchor="middle" font-size="6.5" id="status-ce" font-weight="600" y="26">● Loading...</text>
            </g>

            <!-- ── Main ── -->
            <g class="org-card" data-agent="main" transform="translate(550,420)">
                <rect class="org-card-rect" id="rect-main" x="-60" y="-30" width="120" height="60" rx="8"/>
                <text text-anchor="middle" font-size="15" y="-8">🚀</text>
                <text text-anchor="middle" font-size="10" font-weight="700" fill="#fff" y="7">Main</text>
                <text text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.6)" y="17">Primary Assistant</text>
                <text text-anchor="middle" font-size="6.5" id="status-main" font-weight="600" y="26">● Loading...</text>
            </g>

            <!-- ── Brain Trainer node (system, not agent) ── -->
            <g transform="translate(820,420)">
                <rect fill="rgba(20,25,70,0.85)" stroke="#b829dd" stroke-width="1.5" stroke-dasharray="4,3"
                      x="-60" y="-30" width="120" height="60" rx="8" opacity="0.8"/>
                <text text-anchor="middle" font-size="15" y="-8">🧠</text>
                <text text-anchor="middle" font-size="10" font-weight="700" fill="rgba(255,255,255,0.8)" y="7">DWE Brain</text>
                <text text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.5)" y="17">Pinecone RAG</text>
                <text text-anchor="middle" font-size="6.5" fill="#b829dd" font-weight="600" id="brain-score-label" y="26">● Loading...</text>
            </g>

            <!-- Brain connector (dashed, purple) -->
            <line stroke="#b829dd" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"
                  x1="280" y1="390" x2="760" y2="390"/>
            <line stroke="#b829dd" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"
                  x1="820" y1="390" x2="820" y2="390"/>

            <!-- Labels for line annotations -->
            <text x="415" y="374" text-anchor="middle" font-size="7" fill="rgba(184,41,221,0.6)">All agents query Brain</text>
        </svg>
    </div>

    <div class="legend">
        <div class="legend-title">Agent Status</div>
        <div class="legend-item"><div class="legend-dot online"></div><span>Online (gateway up)</span></div>
        <div class="legend-item"><div class="legend-dot idle"></div><span>Idle / Degraded</span></div>
        <div class="legend-item"><div class="legend-dot offline"></div><span>Offline</span></div>
    </div>

    <div class="gateway-status">
        <div class="title">OpenClaw Gateway</div>
        <div id="gateway-info" style="color:rgba(255,255,255,0.5);">Checking...</div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="agent-details" id="agentDetails">
        <button class="agent-details-close" onclick="closeDetails()">×</button>
        <h2 id="detailName">—</h2>
        <div class="agent-details-role" id="detailRole">—</div>
        <div class="detail-status" id="detailStatus">—</div>
        <div class="agent-details-section">
            <h4>Responsibilities</h4>
            <p id="detailResponsibilities">—</p>
        </div>
        <div class="agent-details-section">
            <h4>Reports To</h4>
            <p id="detailReports">—</p>
        </div>
        <div class="agent-details-section">
            <h4>Capabilities</h4>
            <p id="detailCaps">—</p>
        </div>
        <div class="agent-details-section">
            <h4>Channel</h4>
            <p id="detailChannel">—</p>
        </div>
    </div>

    <script>
        const AGENT_META = {
            ceo: {
                name: 'Sidney Garcia', role: 'CEO / Founder', channel: 'All channels',
                responsibilities: 'Strategic direction, final decisions, ecosystem architecture, Wealth Architecture vision',
                reports: 'Self — Founder',
                caps: ['Wealth Architecture', 'Strategic decisions', 'DWE vision']
            },
            cto: {
                name: 'Steve', role: 'Chief Technology Officer', channel: 'Telegram @DWE_CTO_Bot',
                responsibilities: 'Technical architecture, AI infrastructure, code review, system design, OpenClaw platform oversight',
                reports: 'Sidney Garcia (CEO)',
                caps: ['Brain queries', 'Notion tasks', 'Morning briefings', 'Tech decisions']
            },
            anita: {
                name: 'Anita', role: 'Chief Operating Officer', channel: 'Telegram (anita-coo)',
                responsibilities: 'Operations management, task coordination, overdue monitoring, cross-agent delegation, PM authority',
                reports: 'Sidney Garcia (CEO)',
                caps: ['Overdue alerts', 'Task delegation', 'Notion sync', 'COO decisions']
            },
            nicole: {
                name: 'Nicole', role: 'Chief of Staff', channel: 'Telegram (nicole-cos)',
                responsibilities: 'Executive coordination, daily briefings, strategic planning, cross-functional alignment',
                reports: 'Sidney Garcia (CEO)',
                caps: ['Daily briefings', 'Context awareness', 'Strategic alignment', 'Coordination']
            },
            'chief-engineer': {
                name: 'Chief Engineer', role: 'Engineering Lead', channel: 'OpenClaw session',
                responsibilities: 'Daemon health checks, infrastructure oversight, code quality, system reliability, Brain maintenance',
                reports: 'Steve (CTO)',
                caps: ['Daemon monitoring', 'Health alerts', 'Infrastructure', 'System fixes']
            },
            main: {
                name: 'Main', role: 'Primary Assistant', channel: 'OpenClaw webchat',
                responsibilities: 'Primary user interface, general assistance, ad-hoc tasks, research, drafting',
                reports: 'Sidney Garcia (CEO)',
                caps: ['General tasks', 'Research', 'Drafting', 'Brain queries']
            }
        };

        // ── Live status from /mc/agents ───────────────────────────────────────
        async function fetchAgentStatus() {
            try {
                const d = await fetch('/mc/agents').then(r => r.json());
                const gatewayUp = d.gatewayUp;

                document.getElementById('gateway-info').textContent = gatewayUp ? '● Online' : '● Offline';
                document.getElementById('gateway-info').style.color = gatewayUp ? '#00ff88' : '#ff00aa';
                document.getElementById('live-badge').textContent = gatewayUp ? '● Gateway Online' : '● Gateway Offline';
                document.getElementById('live-badge').style.color = gatewayUp ? '#00ff88' : '#ff9500';

                const statusClass = gatewayUp ? 'online' : 'idle';
                const statusColor = gatewayUp ? '#00ff88' : '#ff9500';
                const statusText  = gatewayUp ? '● Online' : '● Offline';
                const lineClass   = gatewayUp ? 'online' : 'idle';

                const agents = ['cto', 'anita', 'nicole', 'ce', 'main'];
                agents.forEach(id => {
                    const rect = document.getElementById('rect-' + id);
                    const text = document.getElementById('status-' + id);
                    if (rect) { rect.className.baseVal = 'org-card-rect ' + statusClass; }
                    if (text) { text.setAttribute('class', 'status-' + statusClass); text.textContent = statusText; text.setAttribute('fill', statusColor); }
                });

                // Update connection lines
                ['line-ceo-cto','line-ceo-anita','line-ceo-nicole','line-cto-ce','line-cto-main'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.setAttribute('class', 'org-line ' + lineClass);
                });
            } catch(e) {
                document.getElementById('live-badge').textContent = '● Error';
            }
        }

        // ── Brain score ───────────────────────────────────────────────────────
        async function fetchBrainScore() {
            try {
                const d = await fetch('/mc/brain').then(r => r.json());
                const el = document.getElementById('brain-score-label');
                if (el) {
                    el.textContent = `● ${d.score}% (${d.passed}/${d.total})`;
                    el.setAttribute('fill', d.score >= 90 ? '#00ff88' : '#b829dd');
                }
            } catch(e) {}
        }

        // ── Agent card click ──────────────────────────────────────────────────
        document.querySelectorAll('.org-card').forEach(card => {
            card.addEventListener('click', function() {
                const id = this.getAttribute('data-agent');
                const meta = AGENT_META[id];
                if (!meta) return;

                document.getElementById('detailName').textContent = meta.name;
                document.getElementById('detailRole').textContent = meta.role;
                document.getElementById('detailResponsibilities').textContent = meta.responsibilities;
                document.getElementById('detailReports').textContent = meta.reports;
                document.getElementById('detailChannel').textContent = meta.channel;

                const capsEl = document.getElementById('detailCaps');
                capsEl.innerHTML = (meta.caps || []).map(c => `<span class="detail-chip">${c}</span>`).join('');

                // Determine status from gateway
                fetch('/mc/agents').then(r => r.json()).then(d => {
                    const text = d.gatewayUp ? 'Online' : 'Offline';
                    const cls  = d.gatewayUp ? 'online' : 'offline';
                    const el   = document.getElementById('detailStatus');
                    el.textContent = id === 'ceo' ? '👑 Active' : '● ' + text;
                    el.className   = 'detail-status ' + (id === 'ceo' ? 'online' : cls);
                }).catch(() => {
                    document.getElementById('detailStatus').textContent = '● Unknown';
                });

                document.getElementById('agentDetails').classList.add('show');
                document.getElementById('overlay').classList.add('show');
            });
        });

        function closeDetails() {
            document.getElementById('agentDetails').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        document.getElementById('overlay').addEventListener('click', closeDetails);

        // Init
        fetchAgentStatus();
        fetchBrainScore();
        setInterval(fetchAgentStatus, 30000);
        setInterval(fetchBrainScore, 60000);
    </script>
</body>
</html>
