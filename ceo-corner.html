<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWE | CEO's Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e27;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(0,0,0,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.3) 0%, transparent 50%),
                linear-gradient(135deg, #0a0e27 0%, #1a1e3c 50%, #0a0e27 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            background: rgba(15, 20, 60, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, #ffaa00, #ff6600); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .back-btn { padding: 0.4rem 0.875rem; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #fff; text-decoration: none; font-size: 0.8125rem; transition: all 0.2s; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .refresh-btn { padding: 0.4rem 0.875rem; background: rgba(255,170,0,0.1); border: 1px solid rgba(255,170,0,0.2); border-radius: 8px; color: #ffaa00; font-size: 0.8125rem; cursor: pointer; transition: all 0.2s; font-family: Inter, sans-serif; }
        .refresh-btn:hover { background: rgba(255,170,0,0.2); }
        .updated-text { color: rgba(255,255,255,0.3); font-size: 0.7rem; }

        .content { padding-top: 70px; padding-bottom: 2rem; }

        /* Grid layout */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; padding: 1.5rem; }
        .grid-full { padding: 0 1.5rem 1.5rem; }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        /* Cards */
        .card { background: rgba(20,20,40,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; padding: 1.25rem; backdrop-filter: blur(12px); }
        .card-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .card-title .icon { font-size: 1rem; }

        /* Drill Score Hero */
        .drill-hero {
            background: linear-gradient(135deg, rgba(255,170,0,0.12), rgba(255,100,0,0.08));
            border: 1px solid rgba(255,170,0,0.25);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        .drill-hero .day-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; }
        .drill-hero .score-big { font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, #ffaa00, #ff6600); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .drill-hero .score-max { font-size: 1.5rem; color: rgba(255,255,255,0.3); font-weight: 300; }
        .drill-hero .level { font-size: 0.85rem; margin-top: 0.5rem; padding: 0.3rem 1rem; border-radius: 2rem; display: inline-block; }
        .level-command { background: rgba(0,255,136,0.15); color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
        .level-strong { background: rgba(0,200,255,0.15); color: #00c8ff; border: 1px solid rgba(0,200,255,0.3); }
        .level-developing { background: rgba(255,170,0,0.15); color: #ffaa00; border: 1px solid rgba(255,170,0,0.3); }
        .level-task { background: rgba(255,60,60,0.15); color: #ff3c3c; border: 1px solid rgba(255,60,60,0.3); }

        /* Score breakdown bars */
        .score-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        .score-label { font-size: 0.75rem; color: rgba(255,255,255,0.6); min-width: 140px; }
        .score-bar-wrap { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
        .score-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .score-bar.high { background: linear-gradient(90deg, #00ff88, #00c8ff); }
        .score-bar.mid { background: linear-gradient(90deg, #ffaa00, #ff8800); }
        .score-bar.low { background: linear-gradient(90deg, #ff4444, #ff6666); }
        .score-val { font-size: 0.75rem; font-weight: 600; min-width: 30px; text-align: right; }

        /* Score history chart */
        .history-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; padding-top: 1rem; }
        .history-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
        .history-bar { width: 100%; min-width: 20px; max-width: 40px; border-radius: 4px 4px 0 0; transition: height 0.4s ease; }
        .history-label { font-size: 0.6rem; color: rgba(255,255,255,0.4); }
        .history-score { font-size: 0.65rem; font-weight: 600; }

        /* CEO Review items */
        .review-item {
            padding: 0.875rem;
            border-radius: 0.75rem;
            background: rgba(255,255,255,0.03);
            margin-bottom: 0.625rem;
            border-left: 3px solid rgba(255,170,0,0.4);
            cursor: default;
            transition: all 0.2s;
        }
        .review-item:hover { background: rgba(255,255,255,0.06); }
        .review-item .name { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; }
        .review-item .meta { font-size: 0.7rem; color: rgba(255,255,255,0.4); display: flex; gap: 1rem; }
        .review-item .badge { font-size: 0.6rem; padding: 0.15rem 0.5rem; border-radius: 1rem; background: rgba(255,170,0,0.12); color: #ffaa00; border: 1px solid rgba(255,170,0,0.2); }

        /* Drill history list */
        .drill-entry { padding: 0.75rem; border-radius: 0.75rem; background: rgba(255,255,255,0.03); margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
        .drill-entry .left { display: flex; flex-direction: column; gap: 0.2rem; }
        .drill-entry .day { font-size: 0.85rem; font-weight: 600; }
        .drill-entry .date { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .drill-entry .right { text-align: right; }
        .drill-entry .score { font-size: 1.1rem; font-weight: 700; }
        .drill-entry .level-tag { font-size: 0.6rem; color: rgba(255,255,255,0.5); }

        /* Empty state */
        .empty { text-align: center; padding: 2rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }

        /* Loading */
        .loading { text-align: center; padding: 2rem; color: rgba(255,255,255,0.3); }
        .loading::after { content: ''; display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,170,0,0.3); border-top-color: #ffaa00; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 0.5rem; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>CEO's Corner</h1>
        <div class="header-right">
            <span class="updated-text" id="updated-at"></span>
            <button class="refresh-btn" onclick="loadAll()">Refresh</button>
            <a href="/" class="back-btn">← Dashboard</a>
        </div>
    </div>

    <div class="content">
        <!-- Top row: Latest Drill Score + Score Breakdown -->
        <div class="grid-2">
            <div id="drill-hero-card" class="drill-hero">
                <div class="loading">Loading drill data</div>
            </div>
            <div class="card">
                <div class="card-title"><span class="icon">📊</span> Score Breakdown</div>
                <div id="score-breakdown">
                    <div class="loading">Loading scores</div>
                </div>
            </div>
        </div>

        <!-- Middle row: Score History + CEO Review Queue -->
        <div class="grid-2">
            <div class="card">
                <div class="card-title"><span class="icon">📈</span> Drill Score History</div>
                <div id="score-history">
                    <div class="loading">Loading history</div>
                </div>
            </div>
            <div class="card">
                <div class="card-title"><span class="icon">📋</span> CEO Review Queue</div>
                <div id="ceo-review">
                    <div class="loading">Loading review items</div>
                </div>
            </div>
        </div>

        <!-- Bottom: Recent Drills -->
        <div class="grid-full">
            <div class="card">
                <div class="card-title"><span class="icon">🎯</span> Recent Drills</div>
                <div id="drill-list">
                    <div class="loading">Loading drills</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCENARIOS = [
            'Bottleneck Identification',
            'Operational Breakdown',
            'System Integration',
            'Automation Opportunity',
            'Visibility & Metrics',
            'Constraint-Based Planning',
            'Full Command Simulation'
        ];

        function levelClass(score) {
            if (score >= 21) return 'level-command';
            if (score >= 16) return 'level-strong';
            if (score >= 11) return 'level-developing';
            return 'level-task';
        }
        function levelText(score) {
            if (score >= 21) return 'Command-Level Thinking';
            if (score >= 16) return 'Strong (Minor Gaps)';
            if (score >= 11) return 'Developing (Needs Guidance)';
            return 'Task-Based Thinking';
        }
        function barClass(val) {
            if (val >= 4) return 'high';
            if (val >= 3) return 'mid';
            return 'low';
        }
        function barColor(score) {
            if (score >= 21) return '#00ff88';
            if (score >= 16) return '#00c8ff';
            if (score >= 11) return '#ffaa00';
            return '#ff4444';
        }

        async function loadAll() {
            try {
                const [drillRes, reviewRes] = await Promise.all([
                    fetch('/mc/ceo-corner/drills'),
                    fetch('/mc/ceo-corner/review')
                ]);
                const drillData = await drillRes.json();
                const reviewData = await reviewRes.json();
                renderDrillHero(drillData);
                renderScoreBreakdown(drillData);
                renderScoreHistory(drillData);
                renderDrillList(drillData);
                renderReviewQueue(reviewData);
                document.getElementById('updated-at').textContent = 'Updated ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function renderDrillHero(data) {
            const el = document.getElementById('drill-hero-card');
            if (!data.latest) {
                el.innerHTML = '<div class="empty">No drills completed yet</div>';
                return;
            }
            const d = data.latest;
            el.innerHTML = `
                <div class="day-label">Day ${d.day} — ${SCENARIOS[d.day - 1] || 'Drill'}</div>
                <div><span class="score-big">${d.total}</span><span class="score-max">/25</span></div>
                <div class="level ${levelClass(d.total)}">${levelText(d.total)}</div>
                <div style="margin-top:0.75rem;font-size:0.75rem;color:rgba(255,255,255,0.4)">${d.date}</div>
                <div style="margin-top:0.5rem;font-size:0.7rem;color:rgba(255,255,255,0.3)">Drill #${data.totalDrills} | Avg: ${data.avgScore || '—'}/25</div>
            `;
        }

        function renderScoreBreakdown(data) {
            const el = document.getElementById('score-breakdown');
            if (!data.latest) { el.innerHTML = '<div class="empty">No data</div>'; return; }
            const d = data.latest;
            const criteria = [
                { label: 'Bottleneck ID', val: d.s1 },
                { label: 'System Thinking', val: d.s2 },
                { label: 'Role Clarity', val: d.s3 },
                { label: 'Solution Quality', val: d.s4 },
                { label: 'Collaboration', val: d.s5 }
            ];
            el.innerHTML = criteria.map(c => `
                <div class="score-row">
                    <span class="score-label">${c.label}</span>
                    <div class="score-bar-wrap"><div class="score-bar ${barClass(c.val)}" style="width:${c.val * 20}%"></div></div>
                    <span class="score-val">${c.val}/5</span>
                </div>
            `).join('');
        }

        function renderScoreHistory(data) {
            const el = document.getElementById('score-history');
            if (!data.history || data.history.length === 0) {
                el.innerHTML = '<div class="empty">Complete more drills to see trends</div>';
                return;
            }
            const maxBars = 14;
            const bars = data.history.slice(-maxBars);
            el.innerHTML = '<div class="history-chart">' + bars.map(h => {
                const pct = (h.total / 25) * 100;
                return `
                    <div class="history-bar-wrap">
                        <div class="history-score" style="color:${barColor(h.total)}">${h.total}</div>
                        <div class="history-bar" style="height:${pct}%;background:${barColor(h.total)}"></div>
                        <div class="history-label">D${h.day}</div>
                    </div>
                `;
            }).join('') + '</div>';
        }

        function renderDrillList(data) {
            const el = document.getElementById('drill-list');
            if (!data.history || data.history.length === 0) {
                el.innerHTML = '<div class="empty">No drill history yet</div>';
                return;
            }
            el.innerHTML = data.history.slice().reverse().slice(0, 10).map(h => `
                <div class="drill-entry">
                    <div class="left">
                        <div class="day">Day ${h.day}: ${SCENARIOS[h.day - 1] || 'Drill'}</div>
                        <div class="date">${h.date}</div>
                    </div>
                    <div class="right">
                        <div class="score" style="color:${barColor(h.total)}">${h.total}/25</div>
                        <div class="level-tag">${levelText(h.total)}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderReviewQueue(data) {
            const el = document.getElementById('ceo-review');
            if (!data.items || data.items.length === 0) {
                el.innerHTML = '<div class="empty">Review queue is clear</div>';
                return;
            }
            el.innerHTML = data.items.map(item => `
                <div class="review-item">
                    <div class="name">${item.name}</div>
                    <div class="meta">
                        <span>${item.date}</span>
                        <span>${item.size}</span>
                        ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        loadAll();
        setInterval(loadAll, 120000);
    </script>
</body>
</html>
