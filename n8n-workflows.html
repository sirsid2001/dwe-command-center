<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWE | n8n Workflows</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e27;
            background-image:
                radial-gradient(ellipse at 20% 30%, rgba(0,0,0,0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.3) 0%, transparent 50%),
                linear-gradient(135deg, #0a0e27 0%, #1a1e3c 50%, #0a0e27 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            background: rgba(15, 20, 60, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, #ff8c42, #ff6600); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-right { display: flex; align-items: center; gap: 0.75rem; }
        .back-btn { padding: 0.4rem 0.875rem; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; text-decoration: none; font-size: 0.8125rem; transition: all 0.2s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .refresh-btn { padding: 0.4rem 0.875rem; background: rgba(255,140,66,0.12); border: 1px solid rgba(255,140,66,0.3); border-radius: 8px; color: #ff8c42; font-size: 0.8125rem; font-family: Inter, sans-serif; cursor: pointer; transition: all 0.2s; }
        .refresh-btn:hover { background: rgba(255,140,66,0.25); }
        .n8n-link { padding: 0.4rem 0.875rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8125rem; transition: all 0.2s; }
        .n8n-link:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .summary-chips { display: flex; gap: 0.5rem; align-items: center; }
        .chip { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 12px; }
        .chip.total { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); }
        .chip.active { background: rgba(0,255,136,0.1); color: #00ff88; border: 1px solid rgba(0,255,136,0.25); }
        .chip.inactive { background: rgba(255,60,60,0.08); color: rgba(255,100,100,0.6); border: 1px solid rgba(255,60,60,0.12); }

        .content { padding: 80px 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }

        .group-panel {
            background: rgba(20, 25, 70, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .group-header {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .group-header:hover { background: rgba(255,255,255,0.03); }
        .group-chevron { transition: transform 0.2s; font-size: 0.65rem; color: rgba(255,255,255,0.3); }
        .group-chevron.collapsed { transform: rotate(-90deg); }
        .group-icon { font-size: 1rem; }
        .group-label { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.8); }
        .group-count {
            margin-left: auto; font-size: 0.65rem; font-weight: 500;
            padding: 3px 10px; border-radius: 12px;
            background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.45);
        }
        .group-body { padding: 0.25rem 0; }

        .wf-item {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.4rem 1rem 0.4rem 2.2rem;
            font-size: 0.75rem; color: rgba(255,255,255,0.65);
            transition: background 0.1s;
        }
        .wf-item:hover { background: rgba(255,255,255,0.02); }
        .wf-dot {
            width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
        }
        .wf-dot.on { background: #00ff88; box-shadow: 0 0 6px rgba(0,255,136,0.4); }
        .wf-dot.off { background: rgba(255,255,255,0.15); }
        .wf-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge {
            font-size: 0.58rem; font-weight: 600; padding: 2px 6px; border-radius: 4px;
            text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
        }
        .badge.schedule { background: rgba(0,140,255,0.15); color: #4da6ff; }
        .badge.webhook { background: rgba(160,0,255,0.15); color: #b366ff; }
        .badge.trigger { background: rgba(255,140,0,0.15); color: #ff8c42; }
        .badge.manual { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); }
        .badge.sub-workflow { background: rgba(0,200,150,0.12); color: #40c8a0; }
        .badge.active { background: rgba(0,255,136,0.12); color: #00ff88; }
        .badge.inactive { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); }

        .loading { color: rgba(255,255,255,0.3); font-size: 0.8rem; padding: 2rem; text-align: center; }
        .updated-text { font-size: 0.65rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ n8n Workflows</h1>
        <div class="header-right">
            <div class="summary-chips" id="summary-chips"></div>
            <span class="updated-text" id="updated-at"></span>
            <button class="refresh-btn" onclick="loadWorkflows()">Refresh</button>
            <a href="https://n8n.tvcpulse.com/" target="_blank" class="n8n-link">Open n8n ↗</a>
            <a href="/" class="back-btn">← Dashboard</a>
        </div>
    </div>

    <div class="content" id="content">
        <div class="loading">Loading workflows...</div>
    </div>

    <script>
        async function loadWorkflows() {
            try {
                const d = await fetch('/mc/n8n-workflows').then(r => r.json());
                renderPage(d);
            } catch(e) {
                document.getElementById('content').innerHTML = '<div class="loading" style="color:#ff6b6b;">Failed to load workflows</div>';
            }
        }

        function renderPage(data) {
            const chips = document.getElementById('summary-chips');
            const content = document.getElementById('content');
            const s = data.summary || {};

            chips.innerHTML = `
                <span class="chip total">${s.total || 0} total</span>
                <span class="chip active">${s.active || 0} active</span>
                <span class="chip inactive">${s.inactive || 0} inactive</span>
            `;

            document.getElementById('updated-at').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

            if (!data.groups || !data.groups.length) {
                content.innerHTML = '<div class="loading">No workflows found</div>';
                return;
            }

            let html = '';
            for (const g of data.groups) {
                const collapsed = (g.id === 'other') ? ' collapsed' : '';
                const hidden = collapsed ? ' style="display:none"' : '';
                html += `<div class="group-panel">`;
                html += `<div class="group-header" onclick="toggleGroup(this)">`;
                html += `<span class="group-chevron${collapsed}">▼</span>`;
                html += `<span class="group-icon">${g.icon}</span>`;
                html += `<span class="group-label">${g.label}</span>`;
                html += `<span class="group-count">${g.activeCount}/${g.totalCount} active</span>`;
                html += `</div>`;
                html += `<div class="group-body"${hidden}>`;
                for (const wf of g.workflows) {
                    const dotCls = wf.active ? 'on' : 'off';
                    const statusBadge = wf.active
                        ? '<span class="badge active">active</span>'
                        : '<span class="badge inactive">inactive</span>';
                    const trigBadge = `<span class="badge ${wf.triggerType}">${wf.triggerType}</span>`;
                    let name = wf.name.replace(/^DWE\s*[-–—]\s*Strategic Pipeline\s*\|\s*/i, '');
                    name = name.replace(/^DWE\s*\|\s*/i, '');
                    name = name.replace(/^PROD\s*\|\s*/i, '');
                    name = name.replace(/^PROF\s*\|\s*/i, '');
                    html += `<div class="wf-item">`;
                    html += `<span class="wf-dot ${dotCls}"></span>`;
                    html += `<span class="wf-name" title="${wf.name}">${name}</span>`;
                    html += trigBadge + statusBadge;
                    html += `</div>`;
                }
                html += `</div></div>`;
            }
            content.innerHTML = html;
        }

        function toggleGroup(el) {
            const chevron = el.querySelector('.group-chevron');
            const body = el.nextElementSibling;
            if (body.style.display === 'none') {
                body.style.display = 'block';
                chevron.classList.remove('collapsed');
            } else {
                body.style.display = 'none';
                chevron.classList.add('collapsed');
            }
        }

        loadWorkflows();
        setInterval(loadWorkflows, 3 * 60 * 1000);
    </script>
</body>
</html>
